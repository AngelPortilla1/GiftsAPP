<div class="bg-gray-100 min-h-screen p-6">
  <header class="bg-blue-500 text-white p-4 rounded-md shadow-md">
    <h1 class="text-3xl font-bold">Gif History</h1>
    <p class="text-lg">Here you can view your previously searched GIFs.</p>
  </header>

  <main class="mt-6">
    <section class="bg-white p-6 rounded-md shadow-md">
      <h3 class="text-xl font-bold text-blue-600">Mostrando: {{ query() }}</h3>
    </section>

    <section class="py-5">
      <h1 class="text-2xl font-bold mb-4">Trending GIFs</h1>
      <gif-list [gifs]="gifsByKey()"></gif-list>
    </section>
  </main>
</div>
